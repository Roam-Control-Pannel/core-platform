name: CI

# "No green, no merge" — every push and PR runs the full check suite.
# This makes the commit-chain discipline a guarantee, not a habit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --frozen-lockfile fails if pnpm-lock.yaml is out of sync with package.json,
      # which catches a committed dependency change that forgot to update the lock.
      # esbuild's build script is pre-approved via onlyBuiltDependencies in
      # pnpm-workspace.yaml, so no interactive approve-builds step is needed in CI.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint runs first: it is the cheapest gate (~seconds) and catches the
      # most common errors, so it gives the fastest red signal. Every workspace
      # lints through the shared @roam/eslint-config presets and one eslint binary.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
