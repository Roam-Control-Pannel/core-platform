packages:
  - "apps/*"
  - "packages/*"

# Dependencies whose install/build scripts pnpm is permitted to run. pnpm (v10+) ignores
# dependency build scripts by default, and `pnpm install --frozen-lockfile` ABORTS with
# ERR_PNPM_IGNORED_BUILDS when an ignored script belongs to a native package that must
# compile. Every native dep a real build/test depends on must be set to `true` here.
# (The two below were left as unfilled "set this to true or false" placeholders in #218,
# which is what turned CI red — an unfilled placeholder counts as NOT allowed.)
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  msgpackr-extract: true
  sharp: true

onlyBuiltDependencies:
  - esbuild
  - msgpackr-extract
  - sharp
  - "@swc/core"
  - "@parcel/watcher"
